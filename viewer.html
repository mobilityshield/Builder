<!DOCTYPE html>
<html lang="en" data-app-base="./">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobility Shield - Part Gallery</title>
  <link rel="shortcut icon" href="imgs/favicon.png" type="image/x-png">
  <link rel="stylesheet" href="viewer.css" type="text/css">

  <script>
    window.ViewerGalleryConfig = {
      appBase: "./",
      hoverDelay: 120,
      warmCount: 6
    };
  </script>
</head>
<body>
  <main class="viewer-page">
    <section class="viewer-grid">

      <!-- Hover preview cards -->
		<div class="viewer-card"
			 tabindex="0"
			 role="link"
			 model-preview-mode="hover"
			 model-href-window="new"
			 model-href="index.html#examples/plate.jscad"
			 model-file="examples/plate.jscad"
			 model-camera-position-x="10"		   
			 model-camera-position-z="60"
			 model-rotate="true"
			 model-rotate-origin-x="-7"
			 model-rotate-origin-y="-7">
		  <div class="viewer-thumb">
			<img class="viewer-image"
				 src="https://builder.mobilityshield.com/part/img/plate-4x3.png"
				 alt="Plate 4x3"
				 data-title="Plate 4x3">
			<div class="viewer-preview" aria-hidden="true"></div>
			<div class="viewer-loading">Loading 3D preview...</div>
		  </div>
		</div>

      <div class="viewer-card"
           tabindex="0"
           role="link"
           model-preview-mode="hover"
           model-href-window="new"
           model-href="index.html#examples/L-plate.jscad"
           model-file="examples/L-plate.jscad"
			 model-camera-position-x="10"		   
			 model-camera-position-z="60"
			 model-rotate="true"
			 model-rotate-origin-x="-7"
			 model-rotate-origin-y="-7">
        <div class="viewer-thumb">
          <img class="viewer-image"
               src="https://builder.mobilityshield.com/part/img/l-plate-3x2.png"
               alt="L-Plate 3x2"
               data-title="L-Plate 3x2">
          <div class="viewer-preview" aria-hidden="true"></div>
          <div class="viewer-loading">Loading 3D preview...</div>
        </div>
      </div>

      <div class="viewer-card"
           tabindex="0"
           role="link"
           model-preview-mode="hover"
           model-href-window="new"
           model-href="index.html#examples/strip.jscad"
           model-file="examples/strip.jscad"
			 model-camera-position-x="10"		   
			 model-camera-position-z="60"
			 model-rotate="true"
			 model-rotate-origin-x="-7"
			 model-rotate-origin-y="-7">
        <div class="viewer-thumb">
          <img class="viewer-image"
               src="https://builder.mobilityshield.com/part/img/strip-3x1.png"
               alt="Strip 3x1"
               data-title="Strip 3x1">
          <div class="viewer-preview" aria-hidden="true"></div>
          <div class="viewer-loading">Loading 3D preview...</div>
        </div>
      </div>

      <!-- Button preview cards -->
      <div class="viewer-card"
           tabindex="0"
           role="link"
           model-preview-mode="hover"
           model-href-window="new"
           model-href="index.html#examples/triangular-plate.jscad"
           model-file="examples/triangular-plate.jscad"
			 model-camera-position-x="10"		   
			 model-camera-position-z="80"
			 model-rotate="true"
			 model-rotate-origin-x="-7"
			 model-rotate-origin-y="-7">
        <div class="viewer-thumb">
          <img class="viewer-image"
               src="https://builder.mobilityshield.com/part/img/triangular-plate-3x3.png"
               alt="Triangular Plate 3x3"
               data-title="Triangular Plate 3x3">
          <div class="viewer-preview" aria-hidden="true"></div>
          <div class="viewer-loading">Loading 3D preview...</div>
        </div>
      </div>

      <div class="viewer-card"
           tabindex="0"
           role="link"
           model-preview-mode="button"
           model-href-window="new"
           model-href="index.html#examples/stl/Motor-Mount-28BYJ-48_M3INSERT.stl"
           model-file="examples/stl/Motor-Mount-28BYJ-48_M3INSERT.jscad"
			 model-camera-position-x="-3"		   
			 model-camera-position-z="90"
			 model-rotate="true"
			 model-rotate-origin-x="3">
        <div class="viewer-thumb">
          <img class="viewer-image"
               src="https://builder.mobilityshield.com/part/img/motor-mount-28byj-48-m3-insert.png"
               alt="Motor Mount 28BYJ-48 M3 Insert"
               data-title="Motor Mount 28BYJ-48 M3 Insert">
          <div class="viewer-preview" aria-hidden="true"></div>
          <div class="viewer-loading">Loading 3D preview...</div>
          <button type="button" class="viewer-preview-button" aria-pressed="false">3D Preview</button>
        </div>
      </div>

      <div class="viewer-card"
           tabindex="0"
           role="link"
           model-preview-mode="button"
           model-href-window="new"
           model-href="index.html#examples/stl/wheel-hex_M3TAP.stl"
           model-file="examples/stl/wheel-hex_M3TAP.jscad"
			 model-camera-position-x="-4"
			 model-camera-position-y="6"			 
			 model-camera-position-z="110"
			 model-rotate="true"
			 model-rotate-origin-x="2"
			 model-rotate-origin-y="3">
        <div class="viewer-thumb">
          <img class="viewer-image"
               src="https://builder.mobilityshield.com/part/img/wheel-hex-m3-tap.png"
               alt="Wheel Hex M3 TAP"
               data-title="Wheel Hex M3 TAP">
          <div class="viewer-preview" aria-hidden="true"></div>
          <div class="viewer-loading">Loading 3D preview...</div>
          <button type="button" class="viewer-preview-button" aria-pressed="false">3D Preview</button>
        </div>
      </div>

    </section>
  </main>

  <script src="dist/viewer.js"></script>
</body>
</html>
